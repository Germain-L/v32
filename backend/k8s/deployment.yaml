apiVersion: apps/v1
kind: Deployment
metadata:
  name: v32-backend
  namespace: default
  labels:
    app: v32-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: v32-backend
  template:
    metadata:
      labels:
        app: v32-backend
    spec:
      containers:
        - name: backend
          image: harbor.gmn.lan/v32/backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: v32-backend-secret
                  key: api-key
            - name: DB_PATH
              value: /data/meals.db
          volumeMounts:
            - name: data
              mountPath: /data
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 5
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: v32-backend-data
